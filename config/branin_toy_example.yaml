# Toy experiment: 2D Augmented Branin benchmark with the BoTorch GP surrogate
#
# Run with:
#   uv run activelearning config/branin_toy_example.yaml

runtime:
  device: cpu
  precision: 64

dataset:
  type: ListDataset

surrogate:
  type: BoTorchGPSurrogate

acquisition:
  type: QMultiFidelityLowerBoundMaxValueEntropy
  candidate_set_spec:
    type: HypercubeCandidateSetSpec
    bounds:
      - [-5.0, 10.0]
      - [0.0, 15.0]
    n_points: 1000
    strategy: lhs

sampler:
  type: HypercubeSampler
  bounds:
    - [-5.0, 10.0]
    - [0.0, 15.0]
  num_samples: 100000
  fidelities: [1, 2, 3]
  point_strategy: lhs

selector:
  type: CostAwareSelector

oracle:
  type: BraninOracle
  fidelity_costs:
    1: 0.01
    2: 0.1
    3: 1.0

budget:
  available_budget: 20.0
  schedule:
    type: constant
    value: 1.0

logger:
  type: ConsoleLogger
  project_name: activelearning_prototyping
